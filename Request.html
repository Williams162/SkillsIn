<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Check Out these Profiles!</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>

    <body>
         <div id="header">
            <h1>Request Help!</h1>
        </div>

        <div id="main-home">
        <h2>Enter Your Request</h2>
        <form action="/submit_request" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="location">Location:</label><br>
            <input type="text" id="location" name="location"><br><br>

            <label for="request">Request Details:</label><br>
            <textarea id="request" name="request" rows="4" cols="50"></textarea><br><br>

            <input type="submit" value="Submit Request">
        </form>
        </div>



    </body>

</html>
